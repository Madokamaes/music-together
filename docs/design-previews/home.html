<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Together</title>
    <link rel="stylesheet" href="./music-together-preview.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="header">
        <div class="container header-inner">
          <a class="brand" href="./home.html" aria-label="Music Together">
            <span class="brand-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z"/><path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg></span>
            <span class="brand-title">Music Together</span>
          </a>
          <div class="user-chip"><i class="online-dot" aria-hidden="true"></i><span>枫糖</span></div>
        </div>
      </header>

      <main class="container main-home">
        <section class="hero" aria-labelledby="hero-title">
          <div class="hero-content">
            <span class="sound-pill"><span class="sound-bars" aria-hidden="true"><i></i><i></i><i></i></span> 实时同步音乐播放</span>
            <h1 id="hero-title">和朋友一起听歌</h1>
            <p>创建或加入一个房间，实时同步音乐播放</p>
          </div>
        </section>

        <section class="grid-2" aria-label="房间操作">
          <article class="card action-card">
            <div>
              <div class="card-head"><span class="icon-box" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7"/><path d="M5 10v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V10"/><path d="M9 21v-6a3 3 0 0 1 6 0v6"/></svg></span><h2>创建房间</h2></div>
              <p>新建一个房间，分享房间号邀请朋友加入</p>
            </div>
            <div class="card-footer"><a class="btn btn-primary" href="./start.html">创建房间</a></div>
          </article>

          <article class="card action-card">
            <div>
              <div class="card-head"><span class="icon-box" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/></svg></span><h2>加入房间</h2></div>
              <p>输入房间号直接加入已有房间</p>
            </div>
            <div class="card-footer">
              <input class="input" placeholder="输入房间号..." value="moon827" />
              <a class="btn btn-secondary" href="./room.html">加入</a>
            </div>
          </article>
        </section>

        <div class="separator"></div>

        <section aria-labelledby="rooms-title">
          <div class="section-title">
            <h2 id="rooms-title">活跃房间 <span>(3)</span></h2>
          </div>
          <div class="room-grid">
            <a class="card room-card active" href="./room.html">
              <div class="room-top">
                <div>
                  <h3 class="room-name">午夜电台</h3>
                  <div class="track-line"><span class="mini-bars" aria-hidden="true"><i></i><i></i><i></i></span><span>偏爱 - 张芸京</span></div>
                </div>
                <span class="lock" aria-label="需要密码"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
              </div>
              <div class="room-meta"><span class="people">● 4</span><span>moon827</span></div>
            </a>

            <a class="card room-card" href="./room.html">
              <div class="room-top">
                <div>
                  <h3 class="room-name">周五歌单</h3>
                  <div class="track-line"><span>后来 - 刘若英</span></div>
                </div>
                <span class="lock" aria-label="公开房间"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg></span>
              </div>
              <div class="room-meta"><span class="people">● 2</span><span>friday</span></div>
            </a>

            <a class="card room-card" href="./room.html">
              <div class="room-top">
                <div>
                  <h3 class="room-name">睡前白噪音</h3>
                  <div class="track-line"><span>正在等待播放</span></div>
                </div>
                <span class="lock" aria-label="公开房间"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg></span>
              </div>
              <div class="room-meta"><span class="people">● 1</span><span>quiet</span></div>
            </a>
          </div>

          <div class="empty-state">
            <span class="empty-icon" aria-hidden="true">♪</span>
            <div><strong>还没有活跃的房间</strong><span>创建一个房间，邀请朋友一起听歌</span></div>
          </div>
        </section>
      </main>

      <footer class="footer">
        <div class="container footer-inner">
          <span>Music Together · Made by Yueby · v1.0.0</span>
          <span>GitHub</span>
        </div>
      </footer>
    </div>
  </body>
</html>
