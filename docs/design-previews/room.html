<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="./music-together-preview.css" />
  </head>
  <body>
    <main class="room-page">
      <header class="room-header">
        <div class="room-header-left">
          <a class="brand" href="./home.html" aria-label="返回首页"><span class="brand-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z"/><path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg></span></a>
          <span class="current-room-name">午夜电台</span>
          <span class="room-code">moon827 ⧉</span>
          <button class="btn btn-ghost desktop-only" type="button">成员 4</button>
          <span class="status-chip"><i class="online-dot" aria-hidden="true"></i>42ms</span>
        </div>
        <div class="room-header-actions">
          <a class="btn btn-ghost btn-icon header-action-icon" href="./search.html" aria-label="搜索点歌"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></a>
          <button class="btn btn-ghost btn-icon desktop-only header-action-icon" type="button" aria-label="设置"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.38a2 2 0 0 0-.73-2.73l-.15-.09a2 2 0 0 1-1-1.74v-.51a2 2 0 0 1 1-1.72l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg></button>
          <a class="btn btn-ghost btn-icon desktop-only header-action-icon" href="./home.html" aria-label="离开房间"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg></a>
          <button class="btn btn-ghost btn-icon mobile-only header-action-icon" type="button" aria-label="更多操作"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg></button>
        </div>
      </header>

      <section class="room-main">
        <div class="player-stage" aria-label="播放器区域">
          <div class="player-content">
            <div class="player-left">
              <div class="cover-context" aria-label="封面区域示意"></div>
              <div class="song-info-row">
                <div class="song-copy">
                  <h1 class="track-title">偏爱</h1>
                  <p class="track-artist">张芸京</p>
                </div>
                <div class="song-actions">
                  <button class="control-btn" type="button" aria-label="调节音量">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M19 5a9 9 0 0 1 0 14"/></svg>
                  </button>
                  <button class="control-btn" type="button" aria-label="聊天">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/></svg>
                  </button>
                </div>
              </div>
              <div class="player-info">
                <div class="progress"><span></span></div>
                <div class="time-row"><span>01:28</span><span>03:32</span></div>
                <div class="control-row" aria-label="播放控制">
                  <div class="control-side">
                    <button class="control-btn" type="button" aria-label="顺序播放">
                      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h14"/><path d="m13 6 6 6-6 6"/></svg>
                    </button>
                  </div>
                  <div class="control-center">
                    <button class="control-btn" type="button" aria-label="上一首">
                      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11 18V6l-8.5 6L11 18Z"/><path d="M13 18V6l8.5 6L13 18Z" transform="scale(-1 1) translate(-34 0)"/></svg>
                    </button>
                    <button class="control-btn play" type="button" aria-label="播放">
                      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    </button>
                    <button class="control-btn" type="button" aria-label="下一首">
                      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 6v12l8.5-6L13 6Z"/><path d="M11 6v12l-8.5-6L11 6Z" transform="scale(-1 1) translate(-14 0)"/></svg>
                    </button>
                  </div>
                  <div class="control-side">
                    <button class="control-btn queue-btn" type="button" aria-label="播放列表">
                      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M3 12h18"/><path d="M3 18h12"/></svg>
                      <span>5</span>
                    </button>
                  </div>
                </div>
              </div>
            </div>
            <div class="lyric-reserved" aria-label="歌词区域预留"></div>
          </div>
        </div>

        <aside class="side-panel" aria-label="聊天">
          <div class="chat-header"><strong><span class="chat-title-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/></svg></span>聊天</strong><span class="status-line"><i class="online-dot" aria-hidden="true"></i>在线</span></div>
          <div class="chat-messages">
            <div class="message">这首进副歌的时候同步很稳。</div>
            <div class="message own">我把下一首加进播放列表了。</div>
            <div class="message">收到，等这首结束。</div>
          </div>
          <div class="chat-input">
            <input class="input" placeholder="输入消息..." />
            <button class="btn btn-secondary btn-icon" type="button">➤</button>
          </div>
        </aside>
      </section>
    </main>
  </body>
</html>
